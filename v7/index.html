    const getPlayer     = id => players.find(p => p.id === id);
    const getTournament = id => tournaments.find(t => t.id === id);
    const winRate       = (w, l) => Math.round(w / (w + l) * 100);

    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function formatDateShort(dateStr) {
      const d = new Date(dateStr + 'T12:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function formatDateRange(start, end) {
      const s = new Date(start + 'T12:00:00');
      const e = new Date(end   + 'T12:00:00');
      const sm = s.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const em = e.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      return `${sm} – ${em}`;
    }

    // Surface color map
    const surfaceColors = {
      'Hard':  '#1A5276',
      'Clay':  '#C0442A',
      'Grass': '#2D6B47'
    };

    function surfaceDot(surface) {
      const color = surfaceColors[surface] || '#888';
      return `<span class="surface-dot" style="background:${color}" aria-hidden="true"></span>`;
    }

    function surfaceLabel(surface) {
      return `<span class="surface-label">${surfaceDot(surface)}<span>${surface}</span></span>`;
    }

    function rankChangeBadge(change) {
      if (change > 0) return `<span class="rank-change rank-change--up">&#9650;${change}</span>`;
      if (change < 0) return `<span class="rank-change rank-change--down">&#9660;${Math.abs(change)}</span>`;
      return `<span class="rank-change rank-change--same">&mdash;</span>`;
    }

    function miniAvatar(player) {
      return `<div class="mini-avatar"><img src="${player.photo}" alt="${player.name}" loading="lazy"></div>`;
    }

    function renderSpotlight() {
      const completed = spotlightMatches.filter(m => m.status === 'completed');
      const upcoming  = spotlightMatches.filter(m => m.status === 'upcoming');

      const completedHTML = completed.map(m => {
        const p1 = getPlayer(m.player1Id);
        const p2 = getPlayer(m.player2Id);
        const p1Win = m.winnerId === p1.id;
        return `
          <div class="spotlight-row">
            <span class="spotlight-row__round">${m.round}</span>
            <div class="spotlight-row__players">
              ${miniAvatar(p1)}
              <span class="spotlight-row__name ${p1Win ? 'spotlight-row__name--winner' : 'spotlight-row__name--loser'}">${p1.name}</span>
            </div>
            <span class="spotlight-row__score">${m.score}</span>
            <div class="spotlight-row__players spotlight-row__players--right">
              <span class="spotlight-row__name ${!p1Win ? 'spotlight-row__name--winner' : 'spotlight-row__name--loser'}">${p2.name}</span>
              ${miniAvatar(p2)}
            </div>
            <div class="spotlight-row__status">Completed</div>
          </div>`;
      }).join('');

      const upcomingHTML = upcoming.map(m => {
        const p1 = getPlayer(m.player1Id);
        const p2 = getPlayer(m.player2Id);
        return `
          <div class="spotlight-row">
            <span class="spotlight-row__round">${m.round}</span>
            <div class="spotlight-row__players">
              ${miniAvatar(p1)}
              <span class="spotlight-row__name">${p1.name}</span>
            </div>
            <span class="spotlight-row__score spotlight-row__score--upcoming">${m.score}</span>
            <div class="spotlight-row__players spotlight-row__players--right">
              <span class="spotlight-row__name">${p2.name}</span>
              ${miniAvatar(p2)}
            </div>
            <div class="spotlight-row__status">
              <span class="dot-upcoming" aria-hidden="true">●</span>Upcoming
            </div>
          </div>`;
      }).join('');

      document.getElementById('spotlight-wrap').innerHTML = `

          <span>Miami Open 2026</span>
          <span>Hard Rock Stadium &middot; Miami, FL</span>
          ${surfaceLabel('Hard')}
          <span>Masters 1000</span>
        </div>
        <div class="spotlight-matches">
          ${completedHTML}
          ${upcomingHTML}
        </div>`;
    }

    function renderPlayers() {
      const html = players.map(p => {
        const pct = winRate(p.wins, p.losses);
        return `
          <article class="player-card">
            <div class="player-card__photo">
              <img src="${p.photo}" alt="${p.name}" loading="lazy">
            </div>
            <div class="player-card__rank">#${p.ranking}${rankChangeBadge(p.rankingChange)}</div>
            <h3 class="player-card__name">${p.name}</h3>
            <div class="player-card__stats">
              <span><span class="stat-val">${p.flag} ${p.nationality}</span></span>
              <span>Record&nbsp; <span class="stat-val">${p.wins}W / ${p.losses}L (${pct}%)</span></span>
              <span>Surface&nbsp; <span class="stat-val">${p.surface}</span></span>
            </div>
          </article>`;
      }).join('');
      document.getElementById('player-grid').innerHTML = html;
    }

    // ============================================================
    //  RENDER: TOURNAMENT CALENDAR
    // ============================================================

    function renderCalendar() {
      const rows = tournaments.map(t => {
        const isActive = t.status === 'active';
        const statusCell = isActive
          ? `<div class="status-active"><span aria-hidden="true">●</span> In Progress</div>`
          : `<span class="status-upcoming">Upcoming</span>`;
        return `
          <tr class="${isActive ? 'row--active' : ''}">
            <td class="td--name">${t.name}</td>
            <td class="td--location">${t.location}</td>
            <td class="td--dates">${formatDateRange(t.startDate, t.endDate)}</td>
            <td>${surfaceLabel(t.surface)}</td>
            <td><span class="tier-label">${t.tier}</span></td>
            <td class="td--status">${statusCell}</td>
          </tr>`;
      }).join('');

      document.getElementById('calendar-wrap').innerHTML = `
        <table class="calendar-table">
          <thead>
            <tr>
              <th>Tournament</th>
              <th>Location</th>
              <th>Dates</th>
              <th>Surface</th>
              <th>Tier</th>
              <th style="text-align:right">Status</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

            </span>
            <span class="result-row__score">${r.score}</span>
            <span class="result-row__player ${!p1Win ? 'result-row__player--winner' : 'result-row__player--loser'}">
              ${p2.flag} ${p2.name}
            </span>
            <div class="result-row__meta">
              <span>${r.round}</span>
              <span>${t.name} &middot; ${r.duration}</span>
            </div>
          </div>`;
      }).join('');
      document.getElementById('results-list').innerHTML = html;
    }

    // ============================================================
    //  RENDER: VENUES
    // ============================================================

    function renderVenues() {
      const html = venues.map(v => `
        <div class="venue-card">
          <h3 class="venue-card__name">${v.name}</h3>
          <p class="venue-card__location">${v.city}, ${v.country}</p>
          <div class="venue-card__surface">${surfaceDot(v.surface)}<span>${v.surface}</span></div>
          <p class="venue-card__capacity"><strong>${v.capacity.toLocaleString()}</strong> capacity</p>
        </div>`).join('');
      document.getElementById('venues-grid').innerHTML = html;
    }

    // ============================================================
    //  COUNTDOWN
    // ============================================================

    function startCountdown() {
      const el = document.getElementById('countdown-value');
      const now = new Date();

      const next = upcomingMatches
        .map(m => new Date(`${m.date}T${m.time}:00`))
        .filter(d => d > now)
        .sort((a, b) => a - b)[0];

      if (!next) {
        el.textContent = 'TBD';
        return;
      }

      function update() {
        const diff = next - new Date();
        if (diff <= 0) {
          el.textContent = 'Now';
          return;
        }
        const days  = Math.floor(diff / 86400000);
        const hours = Math.floor((diff % 86400000) / 3600000);
        const mins  = Math.floor((diff % 3600000)  / 60000);

        if (days > 0) {
          el.textContent = `${days}d ${hours}h`;
        } else if (hours > 0) {
          el.textContent = `${hours}h ${mins}m`;
        } else {
          el.textContent = `${mins}m`;
        }
      }

      update();
      setInterval(update, 60000);
    }

    // ============================================================
    //  INIT
    // ============================================================

    document.addEventListener('DOMContentLoaded', () => {
      renderSpotlight();
      renderPlayers();
      renderCalendar();
      renderUpcoming();
      renderResults();
      renderVenues();
      startCountdown();
    });
  </script>
</body>
</html>
